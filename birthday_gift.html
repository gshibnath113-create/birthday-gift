<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>✨ Magical Birthday Scratch ✨</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #ffd700;
      --purple-deep: #050118;
      --purple-mid: #0d0630;
      --indigo: #6366f1;
      --violet: #7c3aed;
      --pink: #ec4899;
      --sky: #67e8f9;
      --text-main: #e0e7ff;
      --text-sub: #a5b4fc;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Crimson Pro', Georgia, serif;
      min-height: 100vh;
      background: radial-gradient(ellipse at 20% 50%, #0d0630 0%, #050118 40%, #0a0e27 100%);
      color: var(--text-main);
      overflow: hidden;
      position: relative;
    }

    #bgCanvas, #sparkleCanvas, .floaters {
      position: fixed; top:0; left:0; width:100%; height:100%;
      pointer-events: none;
    }
    #bgCanvas { z-index:0; }
    #sparkleCanvas { z-index:99; }
    .floaters { z-index:1; overflow:hidden; }

    .floater {
      position: absolute; font-size: 22px; opacity:0;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(105vh) rotate(0deg) scale(0.8); opacity:0; }
      8%   { opacity:0.85; }
      90%  { opacity:0.85; }
      100% { transform: translateY(-10vh) rotate(360deg) scale(1.1); opacity:0; }
    }

    /* ══════════════════ PAGE 1 CARD ══════════════════ */
    #page1 {
      position: relative; z-index:10;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(165,180,252,0.2);
      border-radius: 32px;
      padding: 52px 56px 46px;
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      box-shadow:
        0 0 0 1px rgba(165,180,252,0.08),
        0 24px 70px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.07);
      display: flex; flex-direction: column; align-items: center;
      animation: cardIn 1s cubic-bezier(0.22,1,0.36,1) both;
      margin: auto;
      max-width: 420px;
      width: 90%;
    }
    body > #page1 {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    @keyframes cardIn {
      from { opacity:0; transform: translate(-50%,-50%) translateY(30px) scale(0.96); }
      to   { opacity:1; transform: translate(-50%,-50%) translateY(0) scale(1); }
    }

    .page1-badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 18px;
      background: rgba(255,215,0,0.08);
      border: 1px solid rgba(255,215,0,0.25);
      border-radius: 100px;
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 22px;
    }

    h1 {
      margin: 0 0 8px;
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.75em;
      font-weight: 700;
      background: linear-gradient(90deg, #a5b4fc, #e0c3fc, #a5b4fc);
      background-size: 200% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradShift 4s linear infinite;
      text-align: center;
      line-height: 1.35;
    }
    @keyframes gradShift {
      0%   { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    .gift-text {
      font-size: 0.9em; color: var(--gold);
      text-shadow: 0 0 18px rgba(251,191,36,0.7);
      margin-bottom: 24px;
      font-style: italic;
      letter-spacing: 0.08em;
      animation: giftGlow 2.5s ease-in-out infinite;
    }
    @keyframes giftGlow {
      0%,100% { text-shadow: 0 0 18px rgba(251,191,36,0.7); }
      50%      { text-shadow: 0 0 32px rgba(251,191,36,1), 0 0 60px rgba(251,191,36,0.5); }
    }

    .divider {
      display: flex; align-items: center; gap: 12px;
      width: 100%; margin-bottom: 28px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(165,180,252,0.4), transparent);
    }
    .divider-gem { color: rgba(165,180,252,0.6); font-size: 0.85rem; }

    .input-group { width: 100%; }

    label {
      display: block; margin-bottom: 12px;
      font-size: 1em; font-style: italic;
      color: var(--text-sub); text-align: center;
      letter-spacing: 0.04em;
    }

    .input-border-wrap {
      position: relative; border-radius: 14px; padding: 2px;
      background: linear-gradient(90deg, #6366f1, #a855f7, #ec4899, #6366f1);
      background-size: 300% 100%;
      animation: borderFlow 3s linear infinite;
    }
    @keyframes borderFlow {
      0%   { background-position: 0% 50%; }
      100% { background-position: 300% 50%; }
    }

    input[type="text"] {
      display: block; width: 100%; padding: 14px 22px;
      font-size: 1.05em; font-family: 'Crimson Pro', serif;
      border: none; border-radius: 12px; outline: none;
      background: rgba(10,14,39,0.92); color: var(--text-main);
    }
    input[type="text"]:focus { background: rgba(20,28,70,0.98); }
    input[type="text"]::placeholder { color: #4b5563; font-style: italic; }

    .btn-wrap { margin-top: 28px; width: 100%; display: flex; justify-content: center; }

    .main-btn {
      padding: 15px 48px;
      font-size: 1rem;
      font-family: 'Cinzel Decorative', serif;
      font-weight: 700;
      letter-spacing: 0.06em;
      border: none; border-radius: 100px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed, #6366f1);
      background-size: 200% 200%;
      color: white; cursor: pointer;
      transition: all 0.35s ease;
      box-shadow: 0 4px 24px rgba(99,102,241,0.5);
      animation: btnPulse 3s ease-in-out infinite;
    }
    @keyframes btnPulse {
      0%,100% { box-shadow: 0 4px 24px rgba(99,102,241,0.5), 0 0 0 0 rgba(99,102,241,0.2); }
      50%      { box-shadow: 0 4px 34px rgba(99,102,241,0.8), 0 0 0 10px rgba(99,102,241,0); }
    }
    .main-btn:hover { transform: translateY(-3px) scale(1.04); box-shadow: 0 10px 36px rgba(99,102,241,0.7); }
    .main-btn:active { transform: translateY(0) scale(0.98); }

    /* ══════════════════ SELECTION SCREEN ══════════════════ */
    .selection-container {
      position: fixed; top:0; left:0; width:100%; height:100%; z-index:20;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      backdrop-filter: blur(14px);
      background: rgba(4,1,20,0.45);
      animation: fadeIn 0.5s ease;
      padding: 20px;
    }
    @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }

    .selection-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.2rem, 3.5vw, 2.2rem);
      margin-bottom: 14px;
      background: linear-gradient(135deg, #fbbf24, #f472b6, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      filter: drop-shadow(0 0 20px rgba(251,191,36,0.3));
    }
    .selection-subtitle {
      color: rgba(200,200,255,0.55);
      font-size: 0.95rem;
      font-style: italic;
      letter-spacing: 0.06em;
      margin-bottom: 36px;
      text-align: center;
    }

    .creature-grid {
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 18px; max-width: 880px;
    }

    .creature-btn {
      width: 150px; height: 190px;
      border-radius: 24px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0; cursor: pointer;
      position: relative; overflow: hidden;
      border: 1.5px solid rgba(255,255,255,0.12);
      box-shadow: 0 12px 40px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.08);
      transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
      animation: none;
      padding: 0;
      font-size: 1rem;
      background: none;
    }

    .creature-btn[data-creature="butterfly"] { background: linear-gradient(160deg, #1a0a2e 0%, #2d1155 60%, #1a0a2e 100%); }
    .creature-btn[data-creature="butterfly"] .c-glow { background: radial-gradient(ellipse at 50% 30%, rgba(251,191,36,0.22) 0%, transparent 70%); }
    .creature-btn[data-creature="fairy"] { background: linear-gradient(160deg, #1f0718 0%, #3d0c32 60%, #1f0718 100%); }
    .creature-btn[data-creature="fairy"] .c-glow { background: radial-gradient(ellipse at 50% 30%, rgba(249,168,212,0.25) 0%, transparent 70%); }
    .creature-btn[data-creature="dragon"] { background: linear-gradient(160deg, #0d0a20 0%, #1e1050 60%, #0d0a20 100%); }
    .creature-btn[data-creature="dragon"] .c-glow { background: radial-gradient(ellipse at 50% 30%, rgba(167,139,250,0.25) 0%, transparent 70%); }
    .creature-btn[data-creature="blue"] { background: linear-gradient(160deg, #021820 0%, #043040 60%, #021820 100%); }
    .creature-btn[data-creature="blue"] .c-glow { background: radial-gradient(ellipse at 50% 30%, rgba(103,232,249,0.25) 0%, transparent 70%); }
    .creature-btn[data-creature="heart"] { background: linear-gradient(160deg, #2e0515 0%, #5c0a2e 60%, #2e0515 100%); }
    .creature-btn[data-creature="heart"] .c-glow { background: radial-gradient(ellipse at 50% 30%, rgba(244,114,182,0.3) 0%, transparent 70%); }

    .c-glow {
      position: absolute; inset: 0; pointer-events: none;
      transition: opacity 0.35s ease;
      opacity: 0.7;
    }
    .c-shimmer {
      position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(115deg, transparent 30%, rgba(255,255,255,0.04) 50%, transparent 70%);
      transform: translateX(-100%);
      transition: transform 0.55s ease;
    }

    .creature-btn:hover { transform: translateY(-14px) scale(1.07); }
    .creature-btn:hover .c-glow { opacity: 1; }
    .creature-btn:hover .c-shimmer { transform: translateX(100%); }

    .creature-btn[data-creature="butterfly"]:hover { border-color: rgba(251,191,36,0.7); box-shadow: 0 24px 55px rgba(0,0,0,0.7), 0 0 45px rgba(251,191,36,0.35); }
    .creature-btn[data-creature="fairy"]:hover { border-color: rgba(249,168,212,0.7); box-shadow: 0 24px 55px rgba(0,0,0,0.7), 0 0 45px rgba(249,168,212,0.35); }
    .creature-btn[data-creature="dragon"]:hover { border-color: rgba(167,139,250,0.7); box-shadow: 0 24px 55px rgba(0,0,0,0.7), 0 0 45px rgba(167,139,250,0.35); }
    .creature-btn[data-creature="blue"]:hover { border-color: rgba(103,232,249,0.7); box-shadow: 0 24px 55px rgba(0,0,0,0.7), 0 0 45px rgba(103,232,249,0.35); }
    .creature-btn[data-creature="heart"]:hover { border-color: rgba(244,114,182,0.8); box-shadow: 0 24px 55px rgba(0,0,0,0.7), 0 0 45px rgba(244,114,182,0.4); }

    .c-icon {
      font-size: 3.2em;
      margin-bottom: 10px;
      position: relative; z-index: 1;
      filter: drop-shadow(0 0 10px currentColor);
      transition: transform 0.3s ease;
    }
    .creature-btn:hover .c-icon { transform: scale(1.15) translateY(-4px); }

    .c-name {
      font-family: 'Cinzel Decorative', serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      position: relative; z-index: 1;
      margin-bottom: 6px;
    }
    .c-desc {
      font-size: 0.65rem;
      font-style: italic;
      opacity: 0.55;
      position: relative; z-index: 1;
      letter-spacing: 0.03em;
      padding: 0 10px;
      text-align: center;
      line-height: 1.4;
    }

    .creature-btn[data-creature="butterfly"] .c-name { color: #fbbf24; }
    .creature-btn[data-creature="fairy"]     .c-name { color: #f9a8d4; }
    .creature-btn[data-creature="dragon"]    .c-name { color: #a78bfa; }
    .creature-btn[data-creature="blue"]      .c-name { color: #67e8f9; }
    .creature-btn[data-creature="heart"]     .c-name { color: #f472b6; }

    .c-line {
      position: absolute; top: 0; left: 20%; right: 20%; height: 2px;
      border-radius: 0 0 4px 4px;
    }
    .creature-btn[data-creature="butterfly"] .c-line { background: linear-gradient(90deg, transparent, #fbbf24, transparent); }
    .creature-btn[data-creature="fairy"]     .c-line { background: linear-gradient(90deg, transparent, #f9a8d4, transparent); }
    .creature-btn[data-creature="dragon"]    .c-line { background: linear-gradient(90deg, transparent, #a78bfa, transparent); }
    .creature-btn[data-creature="blue"]      .c-line { background: linear-gradient(90deg, transparent, #67e8f9, transparent); }
    .creature-btn[data-creature="heart"]     .c-line { background: linear-gradient(90deg, transparent, #f472b6, transparent); }

    /* ══════════════════ SCRATCH UI ══════════════════ */
    .birthday-message {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      text-align: center; z-index: 30; pointer-events: none;
    }
    .birthday-message h2 {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.8rem, 5vw, 3.2rem);
      color: #ffb8d1;
      text-shadow: 0 0 30px #ff69b4, 0 0 60px #a855f7;
      animation: glowPulse 2.5s infinite;
      line-height: 1.4;
    }
    @keyframes glowPulse {
      0%,100% { opacity:0.9; text-shadow: 0 0 30px #ff69b4, 0 0 60px #a855f7; }
      50%      { opacity:1;   text-shadow: 0 0 50px #ffb8d1, 0 0 90px #c084fc; }
    }

    .hint-text {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
      font-family: 'Cinzel Decorative', serif;
      color: rgba(255,255,255,0.9); font-size: 0.95rem;
      letter-spacing: 0.2em;
      text-shadow: 0 0 20px gold;
      z-index: 50; pointer-events: none;
      animation: hintFloat 2s infinite;
      white-space: nowrap;
    }
    @keyframes hintFloat {
      0%,100% { opacity:0.6; transform: translateX(-50%) translateY(0); }
      50%      { opacity:1;   transform: translateX(-50%) translateY(-8px); }
    }

    #scratchCanvas {
      position: fixed; top:0; left:0; width:100%; height:100%;
      z-index:40; cursor:none; touch-action:none;
    }

    /* Creature Layer — DOM‑based image (used for butterfly, fairy) */
    #creatureContainer {
      position: fixed; top:0; left:0; width:100%; height:100%;
      z-index:31; pointer-events:none;
      will-change: transform;
    }
    #creatureImg {
      position: absolute;
      width: 270px; /* reduced by 10% from 300px */
      height: auto;
      transform: translate(-50%, -50%);
      filter: drop-shadow(0 0 25px rgba(255,215,0,0.7)) drop-shadow(0 0 8px rgba(255,255,255,0.5));
      animation: breathe 3s ease-in-out infinite;
      pointer-events: none;
      image-rendering: crisp-edges;
    }
    @keyframes breathe {
      0%,100% { transform: translate(-50%, -50%) scale(1); }
      50%      { transform: translate(-50%, -50%) scale(1.04); }
    }

    #particleCanvas {
      position: fixed; top:0; left:0; width:100%; height:100%;
      z-index:32; pointer-events:none;
    }

    /* Canvas-drawn creature layer (dragon, blue) */
    #creatureCanvas {
      position: fixed; top:0; left:0; width:100%; height:100%;
      z-index:31; pointer-events:none;
    }

    .action-btn {
      position: fixed; z-index: 100;
      padding: 11px 26px;
      background: rgba(10,5,30,0.65);
      backdrop-filter: blur(8px);
      border: 1.5px solid rgba(255,215,0,0.45);
      border-radius: 100px;
      color: white;
      font-family: 'Crimson Pro', serif;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      pointer-events: auto;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      transition: all 0.3s ease;
      letter-spacing: 0.04em;
      animation: none;
    }
    .action-btn:hover {
      background: rgba(99,102,241,0.55);
      border-color: var(--gold);
      transform: scale(1.05);
      box-shadow: 0 6px 28px rgba(99,102,241,0.5);
    }
    .action-btn:active { transform: scale(0.97); }
    #backToSelectionBtn { left: 28px; top: 28px; }
    #nextBtn            { right: 28px; top: 28px; }

    /* ══════════════════ FINAL MESSAGE ══════════════════ */
    .final-message {
      position: fixed; top:0; left:0; width:100%; height:100%; z-index:200;
      background: rgba(8,4,24,0.75);
      backdrop-filter: blur(14px);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: white; text-align: center;
      animation: fadeIn 0.8s ease;
      padding: 30px;
    }
    .final-inner {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(165,180,252,0.2);
      border-radius: 32px;
      padding: 52px 48px;
      max-width: 520px;
      box-shadow: 0 24px 70px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.07);
      backdrop-filter: blur(10px);
    }
    .final-message h2 {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.5rem, 4vw, 2.8rem);
      margin-bottom: 28px;
      background: linear-gradient(135deg, #ffd700, #ff69b4, #a855f7);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 20px rgba(255,215,0,0.4));
      line-height: 1.35;
    }
    .final-message p {
      font-size: 1.2rem;
      margin-bottom: 14px;
      font-style: italic;
      color: rgba(224,231,255,0.85);
      line-height: 1.7;
    }
    .final-message .main-btn {
      margin-top: 28px; animation: none;
    }
  </style>
</head>
<body>
  <canvas id="bgCanvas"></canvas>
  <canvas id="sparkleCanvas"></canvas>
  <div class="floaters" id="floatersContainer"></div>

  <!-- PAGE 1 -->
  <div id="page1" class="card-wrap">
    <div class="page1-badge">✦ &nbsp; A Gift &nbsp; ✦</div>
    <h1>Welcome — Let's Begin</h1>
    <p class="gift-text">🎁 a gift from Shibnath</p>
    <div class="divider"><span class="divider-gem">✦</span></div>
    <div class="input-group">
      <label for="nameInput">Enter your name to begin</label>
      <div class="input-border-wrap">
        <input type="text" id="nameInput" placeholder="Your name here...">
      </div>
    </div>
    <div class="btn-wrap">
      <button class="main-btn" id="continueBtn">Continue →</button>
    </div>
  </div>

  <div id="dynamicContent"></div>

  <script>
  (function(){
    "use strict";

    let userName = '';
    let scratchActive = false;
    let animationFrame = null;
    let bgCtx, spkCtx;

    // ---------- BG CANVAS ----------
    const bgCanvas = document.getElementById('bgCanvas');
    bgCtx = bgCanvas.getContext('2d');
    const spkCanvas = document.getElementById('sparkleCanvas');
    spkCtx = spkCanvas.getContext('2d');

    function resizeCanvases() {
      bgCanvas.width = window.innerWidth;   bgCanvas.height = window.innerHeight;
      spkCanvas.width = window.innerWidth;  spkCanvas.height = window.innerHeight;
    }
    resizeCanvases();
    window.addEventListener('resize', resizeCanvases);

    const starDots = Array.from({length:160}, () => ({
      x:Math.random(), y:Math.random(), r:Math.random()*1.4+0.3,
      phase:Math.random()*Math.PI*2, speed:Math.random()*0.012+0.005
    }));
    const orbs = [
      { x:0.15,y:0.3,r:220,c:'rgba(99,40,200,',  baseA:0.18,phase:0 },
      { x:0.82,y:0.65,r:180,c:'rgba(59,130,246,', baseA:0.15,phase:1.5 },
      { x:0.5, y:0.85,r:160,c:'rgba(168,85,247,', baseA:0.12,phase:3 },
      { x:0.7, y:0.1, r:140,c:'rgba(236,72,153,', baseA:0.10,phase:4.5 },
    ];
    let bgT = 0;
    function drawBg() {
      bgT += 0.008;
      const W = bgCanvas.width, H = bgCanvas.height;
      bgCtx.clearRect(0,0,W,H);
      orbs.forEach(o => {
        const a = o.baseA + Math.sin(bgT+o.phase)*0.07;
        const grad = bgCtx.createRadialGradient(o.x*W,o.y*H,0,o.x*W,o.y*H,o.r);
        grad.addColorStop(0, o.c+a+')');
        grad.addColorStop(1, o.c+'0)');
        bgCtx.fillStyle = grad;
        bgCtx.beginPath(); bgCtx.arc(o.x*W,o.y*H,o.r,0,Math.PI*2); bgCtx.fill();
      });
      starDots.forEach(s => {
        const tw = 0.4+0.6*(0.5+0.5*Math.sin(bgT*s.speed*80+s.phase));
        bgCtx.globalAlpha = tw;
        bgCtx.fillStyle = '#fff';
        bgCtx.beginPath(); bgCtx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2); bgCtx.fill();
      });
      bgCtx.globalAlpha = 1;
      requestAnimationFrame(drawBg);
    }
    drawBg();

    // ---------- SPARKLES ----------
    const sparkles = [];
    const spkColors = ['#a5b4fc','#e0c3fc','#fbbf24','#f9a8d4','#67e8f9','#ffffff'];
    class Sparkle {
      constructor(x,y){
        this.x=x; this.y=y;
        this.vx=(Math.random()-0.5)*4.5; this.vy=(Math.random()-0.5)*4.5-1.5;
        this.size=Math.random()*5+1; this.life=1;
        this.decay=0.03+Math.random()*0.03;
        this.color=spkColors[Math.floor(Math.random()*spkColors.length)];
      }
      update(){ this.x+=this.vx; this.y+=this.vy; this.vy+=0.05; this.life-=this.decay; }
      draw(){
        spkCtx.save(); spkCtx.globalAlpha=this.life*0.9; spkCtx.fillStyle=this.color;
        spkCtx.shadowBlur=18; spkCtx.shadowColor=this.color;
        spkCtx.beginPath();
        const s=this.size*this.life;
        spkCtx.moveTo(this.x,this.y-s);
        spkCtx.lineTo(this.x+s*0.3,this.y-s*0.3); spkCtx.lineTo(this.x+s,this.y);
        spkCtx.lineTo(this.x+s*0.3,this.y+s*0.3); spkCtx.lineTo(this.x,this.y+s);
        spkCtx.lineTo(this.x-s*0.3,this.y+s*0.3); spkCtx.lineTo(this.x-s,this.y);
        spkCtx.lineTo(this.x-s*0.3,this.y-s*0.3);
        spkCtx.closePath(); spkCtx.fill(); spkCtx.restore();
      }
    }
    let lastMx=0, lastMy=0;
    document.addEventListener('mousemove', e => {
      const dx=e.clientX-lastMx, dy=e.clientY-lastMy;
      if(Math.abs(dx)+Math.abs(dy)>6){
        for(let i=0;i<12;i++) sparkles.push(new Sparkle(e.clientX,e.clientY));
        lastMx=e.clientX; lastMy=e.clientY;

    });
    function animateSparkles(){
      spkCtx.clearRect(0,0,spkCanvas.width,spkCanvas.height);
      for(let i=sparkles.length-1;i>=0;i--){
        sparkles[i].update(); sparkles[i].draw();
        if(sparkles[i].life<=0) sparkles.splice(i,1);
      }
      requestAnimationFrame(animateSparkles);
    }

    // ---------- SCRATCH EXPERIENCE (hybrid: DOM for butterfly/fairy, canvas for dragon/blue, none for heart) ----------
    function startScratchExperience(creatureType) {
      scratchActive = true;
      const dyn = document.getElementById('dynamicContent');
      const useDomCreature = (creatureType === 'butterfly' || creatureType === 'fairy');
      const useCanvasCreature = (creatureType === 'dragon' || creatureType === 'blue');
      const isHeart = (creatureType === 'heart'); // no creature drawing

      dyn.innerHTML = `
        <div class="birthday-message"><h2>🎂 Happy Birthday ${userName}! 🎂</h2></div>
        <div class="hint-text">✦ Move to scratch & reveal ✦</div>
        <button class="action-btn" id="backToSelectionBtn">← Choose another</button>
        <button class="action-btn" id="nextBtn">Next →</button>
        <canvas id="scratchCanvas"></canvas>
        ${useDomCreature ? '<div id="creatureContainer"><img id="creatureImg" src="' + getCreatureSVG(creatureType) + '" alt="creature"></div>' : ''}
        ${useCanvasCreature ? '<canvas id="creatureCanvas"></canvas>' : ''}
        <canvas id="particleCanvas"></canvas>
      `;

      const scratchCanvas  = document.getElementById('scratchCanvas');
      const particleCanvas = document.getElementById('particleCanvas');
      const backBtn        = document.getElementById('backToSelectionBtn');
      const nextBtn        = document.getElementById('nextBtn');

      const creatureImg = useDomCreature ? document.getElementById('creatureImg') : null;
      const creatureContainer = useDomCreature ? document.getElementById('creatureContainer') : null;
      const creatureCanvas = useCanvasCreature ? document.getElementById('creatureCanvas') : null;
      const creatureCtx = creatureCanvas ? creatureCanvas.getContext('2d') : null;

      function resizeScratch() {
        scratchCanvas.width  = window.innerWidth;  scratchCanvas.height = window.innerHeight;
        particleCanvas.width = window.innerWidth;  particleCanvas.height = window.innerHeight;
        if (creatureCanvas) {
          creatureCanvas.width = window.innerWidth; creatureCanvas.height = window.innerHeight;
        }
      }
      resizeScratch();
      window.addEventListener('resize', () => { resizeScratch(); drawFoil(); });

      const scratchCtx  = scratchCanvas.getContext('2d');
      const particleCtx = particleCanvas.getContext('2d');

      function drawFoil() {
        const w = scratchCanvas.width, h = scratchCanvas.height;
        scratchCtx.save();
        scratchCtx.globalCompositeOperation = 'source-over';
        scratchCtx.globalAlpha = 1;
        const grad = scratchCtx.createLinearGradient(0,0,w,h);
        grad.addColorStop(0,   '#7B4F00');
        grad.addColorStop(0.2, '#FFD700');
        grad.addColorStop(0.5, '#FFF4A0');
        grad.addColorStop(0.8, '#FFD700');
        grad.addColorStop(1,   '#7B4F00');
        scratchCtx.fillStyle = grad;
        scratchCtx.fillRect(0,0,w,h);

        scratchCtx.save();
        scratchCtx.globalAlpha = 0.25;
        scratchCtx.translate(w/2, h/2);
        scratchCtx.rotate(-38 * Math.PI/180);
        const diag = Math.sqrt(w*w + h*h);
        scratchCtx.translate(-diag/2, -diag/2);
        const colors = [
          'rgba(255,0,80,0.5)','rgba(255,120,0,0.5)','rgba(255,240,0,0.5)',
          'rgba(0,255,120,0.5)','rgba(0,160,255,0.5)','rgba(120,0,255,0.5)'
        ];
        let xOff=0; const seg=diag/colors.length;
        colors.forEach(c => { scratchCtx.fillStyle=c; scratchCtx.fillRect(xOff,0,seg,diag); xOff+=seg; });
        scratchCtx.restore();

        for(let i=0;i<150;i++){
          scratchCtx.fillStyle='#fff';
          scratchCtx.shadowBlur=6; scratchCtx.shadowColor='#fff';
          scratchCtx.beginPath();
          scratchCtx.arc(Math.random()*w, Math.random()*h, Math.random()*3, 0, Math.PI*2);
          scratchCtx.fill();
        }
        scratchCtx.shadowBlur=0;
        scratchCtx.font=`bold ${Math.min(w,h)*0.04}px 'Cinzel Decorative', serif`;
        scratchCtx.textAlign='center';
        scratchCtx.fillStyle='#4a2a00';
        scratchCtx.fillText('✨ SCRATCH TO REVEAL ✨', w/2, h/2);
        scratchCtx.restore();
      }
      drawFoil();

      let targetX = window.innerWidth/2, targetY = window.innerHeight/2;
      let creatureX = targetX, creatureY = targetY;
      let prevCreatureX = creatureX, prevCreatureY = creatureY;
      let prevScratchX = targetX, prevScratchY = targetY;

      function handleMove(x,y){
        targetX = Math.min(window.innerWidth-20, Math.max(20, x));
        targetY = Math.min(window.innerHeight-20, Math.max(20, y));
      }
      scratchCanvas.addEventListener('mousemove', e => handleMove(e.clientX, e.clientY));
      scratchCanvas.addEventListener('touchmove', e => {
        e.preventDefault(); const t=e.touches[0]; handleMove(t.clientX,t.clientY);
      }, {passive:false});
      scratchCanvas.addEventListener('touchstart', e => {
        e.preventDefault(); const t=e.touches[0]; handleMove(t.clientX,t.clientY);
      }, {passive:false});

      const particles = [];
      class Particle {
        constructor(x,y,color,size=3){
          this.x=x; this.y=y;
          this.vx=(Math.random()-0.5)*1.8;
          this.vy=(Math.random()-0.5)*1.8-0.5;
          this.color=color; this.size=size; this.life=1;
          this.decay=0.012+Math.random()*0.018;
        }
        update(){ this.x+=this.vx; this.y+=this.vy; this.vy+=0.02; this.life-=this.decay; }
        draw(ctx){
          ctx.save(); ctx.globalAlpha=this.life*0.8; ctx.fillStyle=this.color;
          ctx.shadowBlur=12; ctx.shadowColor=this.color;
          ctx.beginPath(); ctx.arc(this.x,this.y,Math.max(0,this.size*this.life),0,Math.PI*2);
          ctx.fill(); ctx.restore();
        }
      }

      const particleColors = {
        butterfly: ['#fbbf24','#ff80bf','#7a00ff'],
        fairy: ['#f9a8d4','#ffd700','#ffb8d1'],
        dragon: ['#a78bfa','#ffaa33','#ff4400'],
        blue: ['#00cfff','#ffffff','#1e90ff','#0044ff','#0088ff'],
        heart: ['#ff69b4','#ff1493','#ffb6c1','#ffffff']
      };

      // --- Canvas creature setup (dragon, blue) ---
      let canvasCreature = null;
      if (useCanvasCreature) {
        if (creatureType === 'dragon') {
          const segs = Array.from({length:18}, ()=>({x:0,y:0}));
          canvasCreature = {
            x: creatureX, y: creatureY, vx:0, vy:0, segments: segs,
            update() {
              const dx = targetX - this.x, dy = targetY - this.y;
              const dist = Math.hypot(dx, dy);
              if(dist > 5){
                const angle = Math.atan2(dy, dx);
                const speed = Math.min(10, dist*0.12);
                this.vx += Math.cos(angle)*speed*0.18;
                this.vy += Math.sin(angle)*speed*0.18;
              }
              this.vx *= 0.90; this.vy *= 0.90;
              this.x += this.vx; this.y += this.vy;
              let prevX=this.x, prevY=this.y;
              for(let i=0;i<this.segments.length;i++){
                const seg=this.segments[i];
                const dx=prevX-seg.x, dy=prevY-seg.y;
                const dist=Math.hypot(dx,dy);
                if(dist>14){ seg.x+=dx*0.28; seg.y+=dy*0.28; }
                prevX=seg.x; prevY=seg.y;
              }
              if(Math.random()<0.45) particles.push(new Particle(this.x, this.y, '#ffaa33', 6));
              if(Math.random()<0.2)  particles.push(new Particle(this.x, this.y, '#ff4400', 4));
            },
            draw(ctx){
              const t=Date.now()/250;
              ctx.save();
              ctx.translate(this.x, this.y);
              ctx.scale(1.08, 1.08);
              ctx.translate(-this.x, -this.y);
              ctx.shadowBlur=20;
              for(let i=this.segments.length-1; i>=0; i--){
                const seg=this.segments[i];
                const hue=(i*18+t*20)%360;
                const r=8.5 - i*0.32;
                ctx.shadowColor=`hsl(${hue},100%,60%)`;
                ctx.fillStyle=`hsl(${hue},90%,58%)`;
                ctx.beginPath(); ctx.arc(seg.x,seg.y,r,0,Math.PI*2); ctx.fill();
                ctx.fillStyle=`hsla(${hue},100%,88%,0.2)`;
                ctx.beginPath(); ctx.arc(seg.x-r*0.25, seg.y-r*0.3, r*0.4, 0, Math.PI*2); ctx.fill();
                if(i>1 && i<this.segments.length-2 && i%3===0){
                  const next=this.segments[i+1];
                  const angle=Math.atan2(seg.y-next.y, seg.x-next.x) - Math.PI/2;
                  ctx.save(); ctx.translate(seg.x,seg.y); ctx.rotate(angle);
                  ctx.fillStyle=`hsl(${hue},100%,70%)`;
                  ctx.beginPath();
                  ctx.moveTo(0,-r); ctx.lineTo(-3,-r-10); ctx.lineTo(3,-r-10); ctx.closePath();
                  ctx.fill(); ctx.restore();
                }
              }
              ctx.shadowBlur=35; ctx.shadowColor='#ffaa00';
              ctx.fillStyle='#b87cfc';
              ctx.beginPath(); ctx.arc(this.x,this.y,20,0,Math.PI*2); ctx.fill();
              ctx.fillStyle='rgba(200,150,255,0.25)';
              ctx.beginPath(); ctx.arc(this.x-5,this.y-5,8,0,Math.PI*2); ctx.fill();
              ctx.beginPath(); ctx.arc(this.x+5,this.y-3,5,0,Math.PI*2); ctx.fill();
              ctx.fillStyle='#ffd700'; ctx.shadowBlur=20; ctx.shadowColor='#ffd700';
              ctx.beginPath();
              ctx.moveTo(this.x-8,this.y-14); ctx.lineTo(this.x-16,this.y-32); ctx.lineTo(this.x-4,this.y-14); ctx.closePath();
              ctx.fill();
              ctx.beginPath();
              ctx.moveTo(this.x+8,this.y-14); ctx.lineTo(this.x+16,this.y-32); ctx.lineTo(this.x+4,this.y-14); ctx.closePath();
              ctx.fill();
              ctx.shadowBlur=25; ctx.shadowColor='#ff4400';
              ctx.fillStyle='#ff6600';
              ctx.beginPath(); ctx.arc(this.x-7,this.y-5,7,0,Math.PI*2); ctx.fill();
              ctx.beginPath(); ctx.arc(this.x+7,this.y-5,7,0,Math.PI*2); ctx.fill();
              ctx.fillStyle='#ffcc00';
              ctx.beginPath(); ctx.arc(this.x-7,this.y-5,4,0,Math.PI*2); ctx.fill();
              ctx.beginPath(); ctx.arc(this.x+7,this.y-5,4,0,Math.PI*2); ctx.fill();
              ctx.fillStyle='#000';
              ctx.beginPath(); ctx.arc(this.x-7,this.y-5,2,0,Math.PI*2); ctx.fill();
              ctx.beginPath(); ctx.arc(this.x+7,this.y-5,2,0,Math.PI*2); ctx.fill();
              ctx.fillStyle='rgba(255,255,255,0.9)';
              ctx.beginPath(); ctx.arc(this.x-6,this.y-6,1.2,0,Math.PI*2); ctx.fill();
              ctx.beginPath(); ctx.arc(this.x+8,this.y-6,1.2,0,Math.PI*2); ctx.fill();
              ctx.fillStyle='#4a0080'; ctx.shadowBlur=0;
              ctx.beginPath(); ctx.arc(this.x-3,this.y+6,2,0,Math.PI*2); ctx.fill();
              ctx.beginPath(); ctx.arc(this.x+3,this.y+6,2,0,Math.PI*2); ctx.fill();
              ctx.restore();
            }
          };
          canvasCreature.segments.forEach(s => { s.x=creatureX; s.y=creatureY; });
        } else if (creatureType === 'blue') {
          const tailPositions = [];
          const MAX_TAIL = 18;
          canvasCreature = {
            x: creatureX, y: creatureY, vx:0, vy:0,
            update() {
              const dx = targetX - this.x, dy = targetY - this.y;
              const dist = Math.hypot(dx, dy);
              if(dist > 5){
                const angle = Math.atan2(dy, dx);
                const speed = Math.min(14, dist*0.13);
                this.vx += Math.cos(angle)*speed*0.22;
                this.vy += Math.sin(angle)*speed*0.22;
              }
              this.vx *= 0.88; this.vy *= 0.88;
              this.x += this.vx; this.y += this.vy;

              tailPositions.push({x: this.x, y: this.y});
              if (tailPositions.length > MAX_TAIL) tailPositions.shift();

              if(Math.random()<0.6) particles.push(new Particle(this.x, this.y, '#00aaff', 6));
              if(Math.random()<0.3) particles.push(new Particle(this.x, this.y, '#ffffff', 4));
            },
            draw(ctx){
              const time = Date.now() / 150;
              const pulse = 0.9 + 0.15 * Math.sin(time * 2);
              ctx.save();
              ctx.translate(this.x, this.y);
              ctx.scale(0.9, 0.9);
              ctx.translate(-this.x, -this.y);

              if (tailPositions.length > 2) {
                ctx.lineCap = 'round';
                // outer glow pass
                ctx.shadowBlur = 28; ctx.shadowColor = '#00aaff';
                for (let i = 0; i < tailPositions.length - 1; i++) {
                  const p1 = tailPositions[i], p2 = tailPositions[i+1];
                  const progress = i / tailPositions.length;
                  const flameWidth = 22 + 36 * (1 - progress) * (0.8 + 0.3 * Math.sin(time + i * 0.5));
                  const alpha = (1 - progress) * 0.8;
                  ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
                  ctx.lineWidth = flameWidth;
                  ctx.strokeStyle = `rgba(0, 180, 255, ${alpha * 0.5})`;
                  ctx.stroke();
                }
                // mid pass
                ctx.shadowBlur = 22; ctx.shadowColor = '#0066ff';
                for (let i = 0; i < tailPositions.length - 1; i++) {
                  const p1 = tailPositions[i], p2 = tailPositions[i+1];
                  const progress = i / tailPositions.length;
                  const flameWidth = 22 + 36 * (1 - progress) * (0.8 + 0.3 * Math.sin(time + i * 0.5));
                  const alpha = (1 - progress) * 0.8;
                  ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
                  ctx.lineWidth = flameWidth * 0.6;
                  ctx.strokeStyle = `rgba(0, 120, 255, ${alpha})`;
                  ctx.stroke();
                }
                // core pass
                ctx.shadowBlur = 18; ctx.shadowColor = '#88ddff';
                for (let i = 0; i < tailPositions.length - 1; i++) {
                  const p1 = tailPositions[i], p2 = tailPositions[i+1];
                  const progress = i / tailPositions.length;
                  const flameWidth = 22 + 36 * (1 - progress) * (0.8 + 0.3 * Math.sin(time + i * 0.5));
                  const alpha = (1 - progress) * 0.8;
                  ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
                  ctx.lineWidth = flameWidth * 0.3;
                  ctx.strokeStyle = `rgba(180, 230, 255, ${alpha * 0.9})`;
                  ctx.stroke();
                }
              }

              const gradient = ctx.createRadialGradient(this.x, this.y, 5, this.x, this.y, 50 * pulse);
              gradient.addColorStop(0, 'rgba(0, 180, 255, 0.6)');
              gradient.addColorStop(0.4, 'rgba(0, 100, 255, 0.3)');
              gradient.addColorStop(0.8, 'rgba(0, 50, 200, 0.1)');
              gradient.addColorStop(1, 'rgba(0, 20, 150, 0)');
              ctx.fillStyle = gradient;
              ctx.shadowBlur = 45; ctx.shadowColor = '#0088ff';
              ctx.beginPath();
              ctx.arc(this.x, this.y, 50 * pulse, 0, Math.PI*2);
              ctx.fill();

              for (let f = 0; f < 5; f++) {
                const flickerAngle = time * 0.5 + f * 1.2;
                const flickerDist = 28 + 8 * Math.sin(time * 1.5 + f);
                const fx = this.x + Math.cos(flickerAngle) * flickerDist;
                const fy = this.y + Math.sin(flickerAngle) * flickerDist;
                ctx.shadowBlur = 25; ctx.shadowColor = '#00aaff';
                ctx.fillStyle = `rgba(0, 160, 255, ${0.5 + 0.3 * Math.sin(time*2 + f)})`;
                ctx.beginPath();
                ctx.arc(fx, fy, 6 + 3 * Math.sin(time*2 + f*2), 0, Math.PI*2);
                ctx.fill();
              }

              const coreGrad = ctx.createRadialGradient(this.x-6, this.y-6, 5, this.x, this.y, 28);
              coreGrad.addColorStop(0, '#ffffff');
              coreGrad.addColorStop(0.2, '#d0f0ff');
              coreGrad.addColorStop(0.5, '#00aaff');
              coreGrad.addColorStop(0.8, '#0055cc');
              coreGrad.addColorStop(1, '#001166');
              ctx.shadowBlur = 40; ctx.shadowColor = '#00aaff';
              ctx.beginPath();
              ctx.arc(this.x, this.y, 25, 0, Math.PI*2);
              ctx.fillStyle = coreGrad;
              ctx.fill();

              ctx.shadowBlur = 35; ctx.shadowColor = '#ffffff';
              ctx.beginPath();
              ctx.arc(this.x-3, this.y-3, 11, 0, Math.PI*2);
              ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
              ctx.fill();
              
              ctx.shadowBlur = 25; ctx.shadowColor = '#88ddff';
              ctx.beginPath();
              ctx.arc(this.x-2, this.y-2, 6, 0, Math.PI*2);
              ctx.fillStyle = 'rgba(200, 240, 255, 0.7)';
              ctx.fill();

              ctx.shadowBlur = 20; ctx.shadowColor = '#00aaff';
              for (let i=0; i<8; i++) {
                const sparkAngle = time * 0.8 + i * 0.8;
                const rad = 32 + 4 * Math.sin(time + i);
                const sx = this.x + Math.cos(sparkAngle) * rad;
                const sy = this.y + Math.sin(sparkAngle) * rad;
                ctx.fillStyle = i % 2 === 0 ? '#aaf0ff' : '#0088ff';
                ctx.beginPath();
                ctx.arc(sx, sy, 3.5 + 2 * Math.sin(time*1.5 + i), 0, Math.PI*2);
                ctx.fill();
              }
              ctx.restore();
            }
          };
          for (let i=0; i<MAX_TAIL; i++) tailPositions.push({x: creatureX, y: creatureY});
        }
      }

      function animate(){
        if(!scratchActive) return;

        if (useDomCreature) {
          creatureX += (targetX - creatureX) * 0.22;
          creatureY += (targetY - creatureY) * 0.22;
          creatureContainer.style.transform = `translate(${creatureX}px, ${creatureY}px)`;
        } else if (useCanvasCreature && canvasCreature) {
          canvasCreature.update();
          creatureX = canvasCreature.x;
          creatureY = canvasCreature.y;
          creatureCtx.clearRect(0, 0, creatureCanvas.width, creatureCanvas.height);
          canvasCreature.draw(creatureCtx);
        } else {
          // No creature (heart): follow cursor exactly
          creatureX = targetX;
          creatureY = targetY;
        }

        const _moveDist = Math.hypot(creatureX - prevCreatureX, creatureY - prevCreatureY);
        if (_moveDist > 0.4) {
          scratchCtx.save();
          scratchCtx.globalCompositeOperation = 'destination-out';
          scratchCtx.lineWidth = 134;
          scratchCtx.lineCap = 'round';
          scratchCtx.strokeStyle = 'rgba(0,0,0,1)';
          scratchCtx.fillStyle   = 'rgba(0,0,0,1)';
          scratchCtx.beginPath();
          scratchCtx.moveTo(prevCreatureX, prevCreatureY);
          scratchCtx.lineTo(creatureX, creatureY);
          scratchCtx.stroke();
          scratchCtx.beginPath(); scratchCtx.arc(creatureX, creatureY, 66.5, 0, Math.PI*2); scratchCtx.fill();
          scratchCtx.restore();
        }
        prevCreatureX = creatureX;
        prevCreatureY = creatureY;
        prevScratchX = targetX;
        prevScratchY = targetY;

        const colors = particleColors[creatureType] || ['#ffffff'];
        if(particles.length < 60) {
          if(Math.random()<0.45) particles.push(new Particle(creatureX, creatureY, colors[Math.floor(Math.random()*colors.length)], 4));
          if(Math.random()<0.2)  particles.push(new Particle(creatureX + (Math.random()-0.5)*15, creatureY + (Math.random()-0.5)*15, colors[0], 3));
        }

        particleCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
        for(let i=particles.length-1; i>=0; i--){
          particles[i].update();
          particles[i].draw(particleCtx);
          if(particles[i].life<=0) particles.splice(i,1);
        }

        animationFrame = requestAnimationFrame(animate);
      }
      animate();

        scratchActive=false; cancelAnimationFrame(animationFrame);
        dyn.innerHTML='';
        document.getElementById('page1').style.display='none';
        showCreatureSelection();
      });
